<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Abdullah Store</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 1rem;
            background: radial-gradient(ellipse at 50% 40%, rgba(245, 166, 35, 0.08) 0%, transparent 60%);
        }

        .auth-box {
            width: 100%;
            max-width: 480px;
        }

        .auth-tabs {
            display: flex;
            gap: 4px;
            background: var(--dark-card2);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 28px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .divider-or {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .divider-or::before,
        .divider-or::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--dark-border);
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap input {
            padding-right: 44px;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.1rem;
            padding: 4px;
        }

        .password-toggle:hover {
            color: var(--gold);
        }
    </style>
</head>

<body>

    <nav class="navbar" id="navbar">
        <a href="/" class="navbar-brand">
            <div class="brand-icon">🛍️</div>Abdullah<span>Store</span>
        </a>
        <div class="navbar-actions">
            <a href="/cart.html" class="cart-btn">🛒 Cart <span class="cart-count" style="display:none">0</span></a>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-box">
            <div style="text-align:center; margin-bottom:32px">
                <div style="font-size:3rem; margin-bottom:12px">🛍️</div>
                <h1 style="font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700">Welcome to Abdullah
                    Store</h1>
                <p style="color:var(--text-secondary); margin-top:8px; font-size:0.9rem">Sign in or create your account
                    to continue</p>
            </div>

            <div class="card">
                <div class="auth-tabs">
                    <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
                    <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</div>
                </div>

                <!-- Login Form -->
                <div class="auth-form active" id="form-login">
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="login-email" placeholder="your@email.com"
                                required autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <div class="password-wrap">
                                <input type="password" class="form-control" id="login-password"
                                    placeholder="Enter password..." required autocomplete="current-password">
                                <span class="password-toggle" onclick="togglePass('login-password', this)">👁️</span>
                            </div>
                        </div>
                        <div
                            style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                            <label
                                style="display:flex; align-items:center; gap:8px; font-size:0.875rem; cursor:pointer; color:var(--text-secondary)">
                                <input type="checkbox" style="accent-color:var(--gold)"> Remember me
                            </label>
                            <a href="#" style="color:var(--gold); font-size:0.875rem">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">Sign In →</button>
                    </form>
                    <div class="divider-or">or continue as</div>
                    <div
                        style="padding:14px; background:var(--dark-card2); border-radius:var(--radius-sm); font-size:0.85rem; color:var(--text-secondary)">
                        <strong style="color:var(--gold)">Admin Account:</strong> admin@abdullahstore.com / Admin@123
                    </div>
                    <p style="text-align:center; margin-top:20px; font-size:0.875rem; color:var(--text-secondary)">
                        Don't have an account? <a href="#" onclick="switchTab('register')"
                            style="color:var(--gold)">Create one →</a>
                    </p>
                </div>

                <!-- Register Form -->
                <div class="auth-form" id="form-register">
                    <form onsubmit="handleRegister(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="reg-name" placeholder="Muhammad Abdullah"
                                    required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="reg-phone" placeholder="+92 300 1234567">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="reg-email" placeholder="your@email.com"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <div class="password-wrap">
                                <input type="password" class="form-control" id="reg-password"
                                    placeholder="Min 6 characters..." required minlength="6"
                                    autocomplete="new-password">
                                <span class="password-toggle" onclick="togglePass('reg-password', this)">👁️</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="reg-confirm"
                                placeholder="Repeat password..." required>
                        </div>
                        <div style="margin-bottom:20px">
                            <label
                                style="display:flex; align-items:flex-start; gap:10px; font-size:0.875rem; cursor:pointer; color:var(--text-secondary)">
                                <input type="checkbox" style="accent-color:var(--gold); margin-top:3px" required>
                                <span>I agree to the <a href="#" style="color:var(--gold)">Terms & Conditions</a> and <a
                                        href="#" style="color:var(--gold)">Privacy Policy</a></span>
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-btn">Create Account
                            →</button>
                    </form>
                    <p style="text-align:center; margin-top:20px; font-size:0.875rem; color:var(--text-secondary)">
                        Already have an account? <a href="#" onclick="switchTab('login')" style="color:var(--gold)">Sign
                            in →</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cart.js"></script>
    <script>
        // Redirect if already logged in
        if (isLoggedIn()) window.location.href = '/';

        function switchTab(tab) {
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('form-login').classList.toggle('active', tab === 'login');
            document.getElementById('form-register').classList.toggle('active', tab === 'register');
        }

        function togglePass(id, btn) {
            const input = document.getElementById(id);
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            btn.textContent = show ? '🙈' : '👁️';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                const data = await loginUser(document.getElementById('login-email').value, document.getElementById('login-password').value);
                showToast(`Welcome back, ${data.user.name}! 🎉`, 'success');
                await mergeGuestCart();
                setTimeout(() => window.location.href = data.user.role === 'admin' ? '/dashboard.html' : '/', 1000);
            } catch (err) {
                showToast(err.message || 'Login failed', 'error');
                btn.disabled = false; btn.textContent = 'Sign In →';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const pass = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            if (pass !== confirm) { showToast('Passwords do not match!', 'error'); return; }
            const btn = document.getElementById('register-btn');
            btn.disabled = true; btn.textContent = 'Creating account...';
            try {
                const data = await registerUser(
                    document.getElementById('reg-name').value,
                    document.getElementById('reg-email').value,
                    pass,
                    document.getElementById('reg-phone').value
                );
                showToast(`Account created! Welcome, ${data.user.name}! 🎉`, 'success');
                setTimeout(() => window.location.href = '/', 1200);
            } catch (err) {
                showToast(err.message || 'Registration failed', 'error');
                btn.disabled = false; btn.textContent = 'Create Account →';
            }
        }
    </script>
</body>

</html>
